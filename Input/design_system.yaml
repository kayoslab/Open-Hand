# Add to / merge into design_system.yaml

assets:
  variants:
    light:
      logo: "/images/logo.png"
      logoSquare: "/images/logo_square.png"
      hero: "/images/hero_banner.png"
      mockup: "/images/mockup.png"

    dark:
      logo: "/images/logo.png" # replace with /images/logo_dark.png if created
      logoSquare: "/images/logo_square.png"
      hero: "/images/hero_banner.png"
      mockup: "/images/mockup.png"

  social:
    ogImage:
      src: "/images/mockup.png"
      usage: "Default Open Graph and social preview image"
      size:
        width: 1200
        height: 630
      crop:
        objectFit: cover
        objectPosition: "50% 45%"
      alt: "Open Hand conversation card deck mockup"
      title: "Open Hand"
      description: "A 57-card conversation deck for better 1:1s."
      safeArea:
        textFree: true
        avoidOverlayText: true

    twitterImage:
      src: "/images/mockup.png"
      size:
        width: 1200
        height: 675
      crop:
        objectFit: cover
        objectPosition: "50% 45%"

themes:
  light:
    color:
      background: "#FFFFFF"
      surface: "#FFFFFF"
      surfaceMuted: "#EEF2F5"
      textPrimary: "#1B2430"
      textSecondary: "#495463"
      textMuted: "#788190"
      brand: "#0F2238"
      accent: "#C8A34D"
      border: "#D9DEE5"

  dark:
    color:
      background: "#0F2238"
      surface: "#17304B"
      surfaceMuted: "#23415F"
      textPrimary: "#FFFFFF"
      textSecondary: "#D9DEE5"
      textMuted: "#AAB3BF"
      brand: "#FFFFFF"
      accent: "#D8B66A"
      border: "rgba(255,255,255,0.16)"

    hero:
      overlay:
        enabled: true
        gradient: "linear-gradient(90deg, rgba(15,34,56,0.92) 0%, rgba(15,34,56,0.72) 38%, rgba(15,34,56,0.16) 70%, rgba(15,34,56,0.00) 100%)"
      textColor: "#FFFFFF"

motion:
  easing:
    standard: "cubic-bezier(0.2, 0.8, 0.2, 1)"
    spring: "cubic-bezier(0.16, 1, 0.3, 1)"
    snap: "cubic-bezier(0.34, 1.56, 0.64, 1)"

  duration:
    instant: "80ms"
    fast: "140ms"
    base: "220ms"
    slow: "420ms"
    draw: "520ms"
    flip: "640ms"

  card:
    hover:
      transform: "translateY(-6px)"
      shadow: "0 18px 42px rgba(15,34,56,0.16)"
      duration: "{motion.duration.base}"
      easing: "{motion.easing.standard}"

    draw:
      initial:
        opacity: 0
        transform: "translateY(32px) rotate(-3deg) scale(0.96)"
      animate:
        opacity: 1
        transform: "translateY(0) rotate(0deg) scale(1)"
      duration: "{motion.duration.draw}"
      easing: "{motion.easing.spring}"

    flip:
      container:
        perspective: "1200px"
      front:
        backfaceVisibility: hidden
      back:
        transform: "rotateY(180deg)"
        backfaceVisibility: hidden
      active:
        transform: "rotateY(180deg)"
      duration: "{motion.duration.flip}"
      easing: "{motion.easing.standard}"

    stackFan:
      rotationStep: "4deg"
      offsetStep: "8px"
      duration: "{motion.duration.slow}"

accessibility:
  motion:
    reduced:
      disableCardDraw: true
      disableCardFlip: true
      fallbackTransition: "opacity 120ms ease-out"